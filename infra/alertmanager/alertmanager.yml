route:
  receiver: 'local-webhook'
  group_by: ['alertname', 'env']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'local-webhook'
      continue: true

receivers:
  - name: 'local-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:5001/alerts'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'env']
