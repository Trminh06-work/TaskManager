services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: taskmanager-jenkins:lts-jdk21
    container_name: TaskManager
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - ci-net

volumes:
  jenkins_home:

networks:
  ci-net:
    name: ci-net
    driver: bridge
