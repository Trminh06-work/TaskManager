groups:
  - name: taskmanager.rules
    rules:
      - alert: AppDown
        expr: up{job="taskmanager"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Task Manager instance {{ $labels.env }} is DOWN"
          description: "Target {{ $labels.instance }} ({{ $labels.env }}) has been unreachable for 1m."

      - alert: HighErrorRate
        expr: |
          (sum by (env) (rate(http_request_duration_seconds_count{code=~"5.."}[5m])))
          /
          (sum by (env) (rate(http_request_duration_seconds_count[5m]))) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Error rate >5% on {{ $labels.env }}"
          description: "5xx responses exceed 5% of total over 5m."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (env, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency >1s on {{ $labels.env }}"
          description: "95th percentile request duration above 1s for 2m."

      - alert: HighMemoryUsage
        expr: nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node.js heap >90% on {{ $labels.env }}"
          description: "Process may be approaching OOM."
